<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 384" width="680" height="384" role="img" aria-label="Terminal showing a Ruby upgrade in progress">
  <defs>
    <style>
      .mono { font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; }
      .prompt { fill: #a6e3a1; }
      .cmd    { fill: #f5f5f7; }
      .muted  { fill: #6c7086; }
      .ruby   { fill: #f38ba8; }
      .accent { fill: #8b8cff; }
      @keyframes blink { 0%, 50% { opacity: 1; } 50.01%, 100% { opacity: 0; } }
      .cursor { animation: blink 1.1s steps(1) infinite; }
    </style>
  </defs>

  <!-- Transparent padding around the window so the CSS drop-shadow on the
       <img> has room and isn't clipped at the SVG canvas edge. -->
  <g transform="translate(40,24)">
  <!-- Window -->
  <g>
    <rect x="8" y="8" width="584" height="284" rx="14" fill="#11111b" stroke="#313244" stroke-width="1"/>
    <!-- Title bar -->
    <path d="M8 22 A14 14 0 0 1 22 8 H578 A14 14 0 0 1 592 22 V52 H8 Z" fill="#181825"/>
    <line x1="8" y1="52" x2="592" y2="52" stroke="#313244" stroke-width="1"/>
    <circle cx="34" cy="30" r="6" fill="#ff5f56"/>
    <circle cx="56" cy="30" r="6" fill="#ffbd2e"/>
    <circle cx="78" cy="30" r="6" fill="#27c93f"/>
    <text class="mono muted" x="300" y="35" font-size="13" text-anchor="middle">mastodon@server: ~/live</text>
  </g>

  <!-- Output -->
  <g class="mono" font-size="16">
    <text x="32" y="88"><tspan class="prompt">$ </tspan><tspan class="cmd">ruby -v</tspan></text>
    <text x="32" y="116" class="muted">ruby 3.3.6  <tspan class="muted"># target → </tspan><tspan class="ruby">3.4.2</tspan></text>

    <text x="32" y="150"><tspan class="prompt">$ </tspan><tspan class="cmd">rbenv install 3.4.2</tspan></text>

    <!-- Spinner + installing line -->
    <g transform="translate(40,176)">
      <circle cx="0" cy="0" r="7" fill="none" stroke="#313244" stroke-width="2.5"/>
      <path d="M0,-7 A7,7 0 0 1 7,0" fill="none" stroke="#8b8cff" stroke-width="2.5" stroke-linecap="round">
        <animateTransform attributeName="transform" type="rotate" values="0;360" dur="0.8s" repeatCount="indefinite"/>
      </path>
    </g>
    <text x="58" y="181" class="muted">Installing ruby-3.4.2...</text>

    <!-- Progress bar -->
    <rect x="32" y="202" width="360" height="12" rx="6" fill="#313244"/>
    <rect x="32" y="202" width="245" height="12" rx="6" fill="#6364ff"/>
    <text x="404" y="213" class="accent" font-size="14">68%</text>

    <!-- Prompt with blinking block cursor -->
    <text x="32" y="252"><tspan class="prompt">$ </tspan></text>
    <rect class="cursor" x="49" y="238" width="9" height="18" rx="1" fill="#cdd6f4"/>
  </g>
  </g>
</svg>
